<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#080810"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#f7c500"/>

  <!-- Top stripe -->
  <rect x="8" y="0" width="1192" height="4" fill="#f7c500"/>

  <!-- Bottom stripe -->
  <rect x="8" y="626" width="1192" height="4" fill="#00e5b4"/>

  <!-- Chrysalis icon - center right -->
  <g transform="translate(950, 315)">
    <!-- outer shell -->
    <ellipse cx="0" cy="0" rx="85" ry="140" fill="none" stroke="#00e5b4" stroke-width="3"/>
    <!-- inner glow -->
    <ellipse cx="0" cy="0" rx="60" ry="105" fill="none" stroke="#00e5b450" stroke-width="2"/>
    <!-- ribs -->
    <line x1="-70" y1="-60" x2="70" y2="-60" stroke="#00e5b430" stroke-width="1.5"/>
    <line x1="-78" y1="-20" x2="78" y2="-20" stroke="#00e5b430" stroke-width="1.5"/>
    <line x1="-80" y1="20" x2="80" y2="20" stroke="#00e5b430" stroke-width="1.5"/>
    <line x1="-75" y1="60" x2="75" y2="60" stroke="#00e5b430" stroke-width="1.5"/>
    <line x1="-58" y1="100" x2="58" y2="100" stroke="#00e5b430" stroke-width="1.5"/>
    <!-- lambda -->
    <text x="0" y="12" font-family="monospace" font-size="44" fill="#f7c50090" text-anchor="middle" font-weight="bold">λ</text>
    <!-- bracket tip top -->
    <path d="M 0 -145 L -12 -125 L 12 -125 Z" fill="#00e5b4"/>
    <!-- bracket tip bottom -->
    <path d="M 0 145 L -12 125 L 12 125 Z" fill="#f7c500"/>
  </g>

  <!-- "CHRYSALIS" -->
  <text x="80" y="220" font-family="Impact, Arial Black, sans-serif" font-size="128" fill="#f7c500" letter-spacing="6" font-weight="900">CHRYSALIS</text>

  <!-- "FORGE" -->
  <text x="80" y="355" font-family="Impact, Arial Black, sans-serif" font-size="128" fill="#e8e8f0" letter-spacing="6" font-weight="900">FORGE</text>

  <!-- Divider line -->
  <rect x="80" y="380" width="680" height="3" fill="#f7c500"/>

  <!-- Tagline -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="28" fill="#00e5b4" letter-spacing="2">THE AGENT THAT EVOLVES</text>

  <!-- Sub-tagline -->
  <text x="80" y="475" font-family="Arial, sans-serif" font-size="20" fill="#8888aa">MAP-Elites · GEPA · Tiered Sandboxing · Parallel Sub-Agents</text>

  <!-- Bottom label -->
  <text x="80" y="560" font-family="monospace" font-size="18" fill="#6666888">github.com/Diogenesoftoronto/chrysalis-forge</text>

  <!-- Corner decoration -->
  <rect x="1130" y="20" width="50" height="4" fill="#f7c500"/>
  <rect x="1130" y="30" width="50" height="4" fill="#f7c500"/>
  <rect x="1130" y="40" width="50" height="4" fill="#f7c500"/>
</svg>
