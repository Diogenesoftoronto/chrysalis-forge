name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (typecheck · build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Typecheck (noUnusedLocals)
        run: bun run typecheck

      - name: Build optional packages
        run: bun run build:packages

      - name: Test
        run: bun test ./test/*.test.ts ./test/stores/*.test.ts

  # NOTE: a `site` typecheck job is intentionally omitted — the site currently
  # pins a yanked pre-release transitive dep (h3-v2 RC) that 404s on a fresh
  # install. Re-add once site deps are pinned with a committed lockfile.
